name: Update IPTV List
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4 # 升级到 v4
      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Filter
        run: python filter.py

      - name: Commit and Push
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "action@github.com"
          # 使用你喜欢的模糊匹配
          git add *.txt *.m3u
          if ! git diff --staged --quiet; then
            git commit -m "Update IPTV lists: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            # 即使没变化也更新一个 timestamp，防止 GitHub 自动停掉定时任务
            echo "No changes, updating heartbeat..."
            date > heartbeat.txt
            git add heartbeat.txt
            git commit -m "Keep-alive sync: $(date)"
            git push
          fi
