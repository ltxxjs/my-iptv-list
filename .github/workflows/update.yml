name: Update IPTV List
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Filter
        run: python filter.py

      - name: Commit and Push
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "action@github.com"
          # 强制添加所有目标后缀文件
          git add *.txt *.m3u
          if ! git diff --staged --quiet; then
            git commit -m "Update IPTV lists: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes detected, but forcing a heartbeat..."
            date > heartbeat.txt
            git add heartbeat.txt
            git commit -m "Heartbeat update to keep Actions alive"
            git push
          fi
